<html lang="es">
<head>
<meta charset="utf-8">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0f172a;
  --bg-secondary:#1e293b;
  --bg-card:#1e293b;
  --text-primary:#f1f5f9;
  --text-secondary:#94a3b8;
  --accent-blue:#3b82f6;
  --accent-green:#10b981;
  --accent-amber:#f59e0b;
  --accent-red:#ef4444;
  --border:#334155;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  padding:2rem;
}
.header{margin-bottom:2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.header-left h1{font-size:28px;font-weight:600;margin-bottom:0.5rem}
.header-left p{color:var(--text-secondary);font-size:14px}
.back-btn{
  padding:0.5rem 1rem;
  background:var(--bg-secondary);
  border:1px solid var(--border);
  color:var(--text-primary);
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  display:none;
}
.back-btn:hover{border-color:var(--text-secondary)}
.back-btn.show{display:inline-block}
.msel{position:relative;display:inline-block}
.msel-btn{
  padding:0.5rem 1rem;
  background:var(--bg-secondary);
  border:1px solid var(--border);
  color:var(--text-primary);
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  display:flex;
  align-items:center;
  gap:0.5rem;
}
.msel-btn:hover{border-color:var(--text-secondary)}
.msel-drop{
  display:none;
  position:absolute;
  top:100%;
  right:0;
  margin-top:0.5rem;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:8px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  z-index:100;
  min-width:200px;
  padding:0.5rem;
}
.msel-drop.open{display:block}
.msel-item{
  display:flex;
  align-items:center;
  gap:0.5rem;
  padding:0.5rem;
  cursor:pointer;
  border-radius:4px;
  font-size:13px;
}
.msel-item:hover{background:var(--bg-secondary)}
.msel-item input{cursor:pointer}
.msel-item label{cursor:pointer;flex:1;user-select:none}
.content{display:none}
.content.active{display:block}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;margin-bottom:2rem}
.chart-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.5rem;
  cursor:pointer;
  transition:all 0.2s;
}
.chart-card:hover{border-color:var(--accent-blue);transform:translateY(-2px)}
.chart-title{font-size:14px;font-weight:600;margin-bottom:1rem;text-align:center;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px}
.chart-wrapper{position:relative;height:200px}
.chart-stats{display:flex;justify-content:space-around;margin-top:1rem;font-size:12px}
.chart-stat{text-align:center}
.chart-stat-value{font-size:20px;font-weight:700;margin-bottom:0.25rem}
.chart-stat-label{color:var(--text-secondary);font-size:11px}
.aud-section{margin-bottom:2rem}
.section-title{font-size:18px;font-weight:600;margin-bottom:1rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px}
.aud-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem}
.aud-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.25rem;
  cursor:pointer;
  transition:all 0.2s;
}
.aud-card:hover{border-color:var(--accent-blue);transform:translateY(-2px)}
.aud-name{font-size:14px;font-weight:600;margin-bottom:1rem}
.aud-total{font-size:32px;font-weight:700;color:var(--accent-blue);text-align:center;margin-bottom:0.5rem}
.aud-label{font-size:11px;color:var(--text-secondary);text-align:center}
.detail-section{display:none}
.detail-section.active{display:block}
.detail-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:2rem;
}
.detail-title{font-size:24px;font-weight:600}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;margin-bottom:2rem}
.kpi-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.25rem;
  cursor:pointer;
  transition:all 0.2s;
}
.kpi-card:hover{border-color:var(--accent-blue);transform:translateY(-2px)}
.kpi-label{color:var(--text-secondary);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.75rem}
.kpi-value{font-size:32px;font-weight:700;margin-bottom:0.25rem}
.kpi-card.blue .kpi-value{color:var(--accent-blue)}
.kpi-card.green .kpi-value{color:var(--accent-green)}
.kpi-card.amber .kpi-value{color:var(--accent-amber)}
.kpi-card.red .kpi-value{color:var(--accent-red)}
.kpi-desc{color:var(--text-secondary);font-size:13px}
.chart-container-large{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.5rem;
  margin-bottom:2rem;
}
.chart-container-large .chart-title{text-align:left;margin-bottom:1.5rem}
.chart-large{height:300px;position:relative}
.table-container{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  margin-bottom:2rem;
}
.table-header{
  padding:1rem 1.5rem;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:1rem;
}
.table-title{font-size:16px;font-weight:600}
.filters{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.filter-label{color:var(--text-secondary);font-size:13px}
.badge{
  padding:0.35rem 0.75rem;
  border-radius:6px;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  border:1px solid transparent;
  transition:all 0.2s;
}
.badge:hover{opacity:0.8}
.badge.completo{background:#10b98120;color:#10b981;border-color:#10b98140}
.badge.parcial{background:#f59e0b20;color:#f59e0b;border-color:#f59e0b40}
.badge.pendiente{background:#ef444420;color:#ef4444;border-color:#ef444440}
.badge.active{border-color:currentColor;box-shadow:0 0 0 2px currentColor}
.search-box{
  padding:1rem 1.5rem;
  border-bottom:1px solid var(--border);
}
.search-box input{
  width:100%;
  background:var(--bg-secondary);
  border:1px solid var(--border);
  color:var(--text-primary);
  padding:0.5rem 1rem;
  border-radius:6px;
  font-size:13px;
}
.search-box input::placeholder{color:var(--text-secondary)}
.table-wrapper{max-height:600px;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  text-align:left;
  padding:1rem 1.5rem;
  background:var(--bg-secondary);
  color:var(--text-secondary);
  font-weight:500;
  text-transform:uppercase;
  font-size:11px;
  letter-spacing:0.5px;
  position:sticky;
  top:0;
  z-index:1;
}
td{padding:1rem 1.5rem;border-bottom:1px solid var(--border);color:var(--text-primary)}
tr:last-child td{border-bottom:none}
tr:hover{background:var(--bg-secondary)}
tr.group-header td{
  background:var(--bg-primary);
  font-weight:600;
  font-size:12px;
  padding:0.75rem 1.5rem;
}
.status-badge{
  display:inline-block;
  padding:0.25rem 0.75rem;
  border-radius:12px;
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
}
.status-badge.completo{background:#10b98120;color:#10b981}
.status-badge.pendiente{background:#ef444420;color:#ef4444}
.status-badge.parcial{background:#f59e0b20;color:#f59e0b}
.reason{font-size:11px;color:var(--accent-amber);margin-top:0.25rem;font-style:italic}
.empty{text-align:center;padding:3rem;color:var(--text-secondary);font-size:14px}
.desv-detail{
  background:var(--bg-secondary);
  border:1px solid var(--border);
  border-radius:8px;
  padding:1rem;
  margin-top:1rem;
  display:none;
}
.desv-detail.show{display:block}
.desv-detail-title{font-size:14px;font-weight:600;margin-bottom:1rem;color:var(--accent-red)}
.collapsible-section{margin-bottom:2rem}
.collapsible-header{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1.5rem;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.collapsible-header:hover{border-color:var(--accent-blue)}
.collapsible-title{font-size:16px;font-weight:600;display:flex;align-items:center;gap:1rem}
.collapsible-count{
  background:var(--accent-blue);
  color:var(--text-primary);
  padding:0.25rem 0.75rem;
  border-radius:12px;
  font-size:14px;
  font-weight:700;
}
.collapsible-count.green{background:var(--accent-green)}
.collapsible-count.amber{background:var(--accent-amber)}
.collapsible-count.red{background:var(--accent-red)}
.collapsible-arrow{
  font-size:20px;
  color:var(--text-secondary);
  transition:transform 0.2s;
}
.collapsible-section.open .collapsible-arrow{transform:rotate(90deg)}
.collapsible-content{
  display:none;
  margin-top:1rem;
}
.collapsible-section.open .collapsible-content{display:block}
@media(max-width:768px){
  .chart-grid{grid-template-columns:1fr}
  .aud-grid{grid-template-columns:1fr}
}
</style>
<style>
body{padding:1.5rem;max-width:520px;margin:0 auto;}
.dh-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;}
.dh-aud{font-size:12px;color:var(--text-secondary);margin:0;}
.dh-fecha{font-size:19px;font-weight:600;margin:2px 0 0;}
.dh-nav{display:flex;gap:6px;}
.navbtn{width:32px;height:32px;padding:0;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.navbtn:hover{border-color:var(--text-secondary);}
.btn-hoy{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);cursor:pointer;font-size:13px;}
.btn-hoy:hover{border-color:var(--text-secondary);}
.dh-stats{display:flex;gap:8px;margin-bottom:1.4rem;}
.dh-stat{flex:1;border-radius:10px;padding:.6rem;text-align:center;}
.dh-stat b{font-size:20px;font-weight:600;display:block;}
.dh-stat span{font-size:11px;}
.dh-selrow{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin-bottom:1.4rem;}
select{padding:.5rem .8rem;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;flex:1;}
.turno-h{display:flex;align-items:center;gap:8px;margin:0 0 .6rem;}
.turno-h .dot{width:6px;height:6px;border-radius:50%;}
.turno-h span{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);}
.day-card{border-radius:10px;padding:.85rem 1rem;margin-bottom:.6rem;display:flex;align-items:center;gap:10px;}
.day-card .icowrap{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.day-card .icowrap i{font-size:18px;}
.day-card .act{font-size:14px;font-weight:600;margin:0;}
.day-card .meta{font-size:12px;margin:2px 0 0;}
</style>
</head>

function liderDeActividad(a) {
  if(a.equipo && a.equipo.length) {
    for(var i=0;i<a.equipo.length;i++){ if(a.equipo[i].rol==="Lider") return a.equipo[i].auditor; }
    return a.equipo[0].auditor;
  }
  return a.auditor || "";
}
function fmtFechaLarga(f){if(!f)return "";var d=new Date(f+"T12:00:00");var dias=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];var meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];return dias[d.getDay()]+" "+d.getDate()+" de "+meses[d.getMonth()]+" de "+d.getFullYear();}

function cambiarDia(delta){
  var el = document.getElementById('sel-fecha');
  var d = new Date(el.value + 'T12:00:00');
  d.setDate(d.getDate()+delta);
  el.value = d.toISOString().slice(0,10);
  render();
}
function irHoy(){
  document.getElementById('sel-fecha').value = new Date().toISOString().slice(0,10);
  render();
}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function tipoInfo(actividad){
  var a = String(actividad||'').toLowerCase();
  if(a.indexOf('inventario') === 0){
    return {icon:'ti-clipboard-list', bg:'#E6F1FB', icoBg:'#B5D4F4', title:'#0C447C', sub:'#185FA5', dot:'#378ADD'};
  }
  if(a.indexOf('control de doc') === 0){
    return {icon:'ti-file-text', bg:'#EEEDFE', icoBg:'#CECBF6', title:'#3C3489', sub:'#534AB7', dot:'#7F77DD'};
  }
  if(a === 'arqueo de caja'){
    return {icon:'ti-cash', bg:'#FAECE7', icoBg:'#F0997B', title:'#4A1B0C', sub:'#993C1D', dot:'#D85A30'};
  }
  return {icon:'ti-calendar-event', bg:'var(--bg-secondary)', icoBg:'var(--border)', title:'var(--text-primary)', sub:'var(--text-secondary)', dot:'var(--text-muted)'};
}

function render(){
  var aud = document.getElementById('sel-aud').value;
  var fecha = document.getElementById('sel-fecha').value;
  var body = document.getElementById('body');
  document.getElementById('lbl-aud').textContent = aud || 'Sin auditor seleccionado';
  document.getElementById('lbl-fecha').textContent = fmtFechaLarga(fecha);
  if(!aud){
    body.innerHTML = '<div class="day-card" style="background:var(--bg-secondary);justify-content:center;color:var(--text-secondary);">Elegí tu nombre para ver tus tareas.</div>';
    document.getElementById('stat-tareas').textContent = '0';
    document.getElementById('stat-locales').textContent = '0';
    return;
  }

  var esMio = function(a){
    return liderDeActividad(a) === aud || (a.equipo||[]).some(function(m){ return m.auditor === aud; });
  };

  var deHoy = actividades.filter(function(a){ return a.fecha === fecha && esMio(a); });
  var pendientes = actividades.filter(function(a){ return a.plan === 'Falta asignar' && a.fecha !== fecha && esMio(a); });

  var locales = {};
  deHoy.forEach(function(a){ if(a.local) locales[a.local] = true; });
  document.getElementById('stat-tareas').textContent = deHoy.length;
  document.getElementById('stat-locales').textContent = Object.keys(locales).length;

  var html = '';
  if(!deHoy.length){
    html += '<div class="day-card" style="background:var(--bg-secondary);justify-content:center;color:var(--text-secondary);">Sin actividades programadas para este día.</div>';
  } else {
    var ordenTurnos = ['Mañana','Manana','Tarde','Jornada completa'];
    var turnosPresentes = [];
    deHoy.forEach(function(a){
      var t = a.turno || 'Jornada completa';
      if(turnosPresentes.indexOf(t) < 0) turnosPresentes.push(t);
    });
    turnosPresentes.sort(function(a,b){
      var ia = ordenTurnos.indexOf(a); if(ia < 0) ia = 99;
      var ib = ordenTurnos.indexOf(b); if(ib < 0) ib = 99;
      return ia - ib;
    });
    turnosPresentes.forEach(function(t){
      var dotColor = tipoInfo(deHoy.filter(function(a){return (a.turno||'Jornada completa')===t;})[0].actividad).dot;
      html += '<div class="turno-h"><div class="dot" style="background:'+dotColor+'"></div><span>' + esc(t) + '</span></div>';
      deHoy.filter(function(a){ return (a.turno||'Jornada completa') === t; }).forEach(function(a){
        var ti = tipoInfo(a.actividad);
        html += '<div class="day-card" style="background:' + ti.bg + '">' +
          '<div class="icowrap" style="background:' + ti.icoBg + '"><i class="' + ti.icon + ' ti" style="color:' + ti.title + '" aria-hidden="true"></i></div>' +
          '<div style="flex:1;">' +
          '<p class="act" style="color:' + ti.title + '">' + esc(a.actividad) +
          (a.especificacion && a.especificacion !== 'General' ? ' (' + esc(a.especificacion) + ')' : '') + '</p>' +
          '<p class="meta" style="color:' + ti.sub + '">' + (a.local ? esc(a.local) : 'Sin sucursal asignada') +
          (a.observacion ? ' · ' + esc(a.observacion) : '') + '</p>' +
          '</div></div>';
      });
    });
  }

  if(pendientes.length){
    html += '<div class="turno-h"><div class="dot" style="background:var(--text-muted)"></div><span>Pendientes por programar</span></div>';
    pendientes.forEach(function(a){
      var ti = tipoInfo(a.actividad);
      html += '<div class="day-card" style="background:' + ti.bg + '">' +
        '<div class="icowrap" style="background:' + ti.icoBg + '"><i class="' + ti.icon + ' ti" style="color:' + ti.title + '" aria-hidden="true"></i></div>' +
        '<div style="flex:1;">' +
        '<p class="act" style="color:' + ti.title + '">' + esc(a.actividad) + '</p>' +
        '<p class="meta" style="color:' + ti.sub + '">' + esc(a.local||'') + (a.observacion ? ' · ' + esc(a.observacion) : '') + '</p>' +
        '</div></div>';
    });
  }

  body.innerHTML = html;
}
